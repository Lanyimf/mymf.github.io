  - article [ref=e36]:
    - heading "最新公告" [level=2] [ref=e38]
    - heading "1.「全國土地使用分區圖資網路服務」開放付費申請， 歡迎各界多加應用" [level=3] [ref=e39]:
      - link "1.「全國土地使用分區圖資網路服務」開放付費申請， 歡迎各界多加應用" [ref=e40] [cursor=pointer]:
        - /url: TCDNewsDetail.aspx?fid=92
    - heading "為鼓勵民間單位加值應用全國土地使用分區圖資，內政部國土管理署城鄉發展分署自115年1月1日起提供民間單位付費申請「全國土地使用分區圖資網路服務」，其服務內容包含都市計畫使用分區、非都市計畫土地使用分區與非都市計畫土地使用編定等WMTS圖磚介接服務，歡迎各界多加應用，申請流程與文件請詳以下連結。" [level=4] [ref=e41]
    - heading [level=4]
    - heading "2.都計案件上傳更新：台南市政府2025-10-15變更臺南市主要計畫(原臺南縣市都市計畫邊界調整專案通盤檢討)案已於2026-03-05上傳更新" [level=3] [ref=e42]
    - heading "3.都計案件上傳更新：玉里鎮公所2026-01-21變更玉里都市計畫細部計畫(第一次通盤檢討)案已於2026-03-04上傳更新" [level=3] [ref=e43]
    - heading "4.都計案件上傳更新：新北市政府2026-02-06變更大漢溪北都市計畫（第二階段）案已於2026-03-02上傳更新" [level=3] [ref=e44]
    - heading "5.都計案件上傳更新：新北市政府2026-02-06變更大漢溪南都市計畫（第二階段）案已於2026-03-02上傳更新" [level=3] [ref=e45]
    - heading "6.都計案件上傳更新：嘉義縣政府2025-09-26擬定嘉義縣治都市計畫第二期發展區細部計畫(第二階段-整體開發區)案已於2026-03-02上傳更新" [level=3] [ref=e46]
    - heading "7.都計案件上傳更新：嘉義縣政府2026-01-20變更曾文水庫特定區主要計畫（部分水庫專用區為污水處理廠用地）（配合大埔鄉污水下水道系統水資源回收中心工程）案已於2026-03-02上傳更新" [level=3] [ref=e47]
    - heading "8.都計案件上傳更新：南投縣政府2025-12-03變更南投（含南崗地區）都市計畫（部分農業區為第二種乙種工業區(附)、部分綠地用地為綠地用地兼供道路使用）（配合鉅鋐油封工業股份有限公司擴廠）案已於2026-02-26上傳更新" [level=3] [ref=e48]
    - heading "9.都計案件上傳更新：高雄市政府2025-12-15變更原高雄市主要計畫（公共設施用地專案通盤檢討）（第四階段）案已於2026-02-24上傳更新" [level=3] [ref=e49]
    - heading "10.都計案件上傳更新：臺南市政府2026-02-04變更新化主要計畫（第三次通盤檢討）（含計畫圖重製）（第三階段）案已於2026-02-24上傳更新" [level=3] [ref=e50]
